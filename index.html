<!DOCTYPE html>
<!--
  Simple index — the list is driven entirely by projects.json.
  To add / edit / reorder entries, edit projects.json (see README).
  Don't hand-edit the rendered rows; they're built from that file at load.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bold — Prototypes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --font-ui:      'Inter', system-ui, sans-serif;
      --font-display: 'DM Serif Display', Georgia, serif;
      --navy:         #001d56;
      --white:        #ffffff;
      --gray-100:     #f5f5f5;
      --gray-150:     #e5e7eb;
      --gray-200:     #e5e5e5;
      --gray-500:     #6b7280;
      --gray-900:     #171717;
      --gray-muted:   #a3a3a3;
      --purple-600:   #5200d4;
      --blue-600:     #2563eb;
      --red-600:      #dc2626;
      --dot-iz:       #6333e8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--gray-100);
      color: var(--gray-900);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Top bar */
    .topbar {
      background: var(--navy);
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .wordmark { display: flex; align-items: baseline; }
    .wordmark-brand {
      font-family: var(--font-display);
      font-size: 19px;
      font-style: italic;
      color: var(--white);
      letter-spacing: -0.2px;
    }
    .wordmark-sep { font-size: 14px; color: rgba(255,255,255,0.22); margin: 0 9px; font-weight: 300; }
    .wordmark-sub {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    /* Main */
    main { max-width: 820px; margin: 0 auto; padding: 8px 20px 64px; }

    .intro { padding: 28px 2px 4px; }
    .intro h1 { font-family: var(--font-display); font-size: 28px; font-weight: 400; letter-spacing: -0.3px; }
    .intro p { font-size: 14px; color: var(--gray-500); margin-top: 6px; max-width: 560px; line-height: 1.6; }

    /* Section group */
    .section-group { margin-top: 24px; }
    .section-label { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; padding: 0 2px; }
    .section-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .section-rule { flex: 1; height: 1px; background: var(--gray-200); }
    .section-count { font-size: 11px; font-weight: 500; color: var(--gray-muted); flex-shrink: 0; }

    .accent-purple .section-tag { background: #f0ebff; color: var(--purple-600); }
    .accent-blue   .section-tag { background: #ebf0ff; color: var(--blue-600); }
    .accent-red    .section-tag { background: #fef2f2; color: var(--red-600); }

    /* Rows */
    .project-list { display: flex; flex-direction: column; gap: 2px; }
    .project-row {
      display: grid;
      grid-template-columns: 34px 1fr auto;
      align-items: center;
      column-gap: 12px;
      padding: 9px 10px 9px 7px;
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      border-left: 3px solid transparent;
      transition: background 0.12s, border-color 0.12s, box-shadow 0.12s;
    }
    .accent-purple .project-row:hover { background: var(--white); border-left-color: var(--purple-600); box-shadow: 0 1px 8px rgba(82,0,212,0.07); }
    .accent-blue   .project-row:hover { background: var(--white); border-left-color: var(--blue-600);   box-shadow: 0 1px 8px rgba(37,99,235,0.07); }
    .accent-red    .project-row:hover { background: var(--white); border-left-color: var(--red-600);    box-shadow: 0 1px 8px rgba(220,38,38,0.07); }
    .project-row:hover .row-arrow { color: var(--gray-500); transform: translate(1px, -1px); }

    .row-icon {
      font-size: 16px;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      background: var(--white);
      border-radius: 8px;
      border: 1px solid var(--gray-150);
      flex-shrink: 0;
    }
    .row-meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .row-name { font-size: 14px; font-weight: 600; color: var(--gray-900); line-height: 1.3; }
    .row-desc { font-size: 12px; color: var(--gray-500); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .row-right { display: grid; grid-template-columns: 96px 200px 18px; align-items: center; column-gap: 10px; flex-shrink: 0; }
    .row-author { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--gray-500); font-weight: 500; overflow: hidden; }
    .author-dot-sm {
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: white; flex-shrink: 0;
    }
    .row-path { font-size: 11px; color: var(--gray-muted); font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace; letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-arrow { font-size: 13px; color: var(--gray-200); transition: color 0.12s, transform 0.12s; justify-self: end; }

    .load-msg { padding: 40px 2px; font-size: 14px; color: var(--gray-500); }
    .load-msg a { color: var(--blue-600); }
    .load-msg code { font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px; background: var(--gray-200); padding: 1px 5px; border-radius: 4px; }

    @media (max-width: 640px) {
      .row-right { grid-template-columns: auto; }
      .row-author, .row-path { display: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="wordmark">
      <span class="wordmark-brand">Bold</span>
      <span class="wordmark-sep">/</span>
      <span class="wordmark-sub">Prototypes</span>
    </div>
  </header>

  <main>
    <div class="intro">
      <h1>Prototypes &amp; specs</h1>
      <p>An index of Bold's product vision, prototypes, component studies, and written specs. Open any item below.</p>
    </div>
    <div id="index" class="load-msg">Loading…</div>
  </main>

  <script>
    // Category display order + accent colour. Categories not listed here are appended at the end.
    const CATEGORY_ORDER = [
      ['Prototypes',    'accent-purple'],
      ['Design System', 'accent-blue'],
      ['User Research', 'accent-green'],
      ['Strategy',      'accent-red'],
    ];
    const AUTHOR_COLORS = { Izabela: 'var(--dot-iz)', 'Tzu-Yi': '#16a34a', Monica: '#2563eb' };

    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));

    function render(projects) {
      const byCat = new Map();
      for (const p of projects) {
        if (!byCat.has(p.category)) byCat.set(p.category, []);
        byCat.get(p.category).push(p);
      }
      const ordered = [
        ...CATEGORY_ORDER.filter(([c]) => byCat.has(c)),
        ...[...byCat.keys()].filter((c) => !CATEGORY_ORDER.some(([o]) => o === c)).map((c) => [c, 'accent-blue']),
      ];

      const html = ordered.map(([cat, accent]) => {
        const rows = byCat.get(cat).map((p) => {
          const author = esc(p.author || '');
          const color = AUTHOR_COLORS[p.author] || 'var(--gray-500)';
          const external = /^https?:\/\//.test(p.href);
          return `
            <a class="project-row" href="${esc(p.href)}"${external ? ' target="_blank" rel="noopener"' : ''}>
              <div class="row-icon">${esc(p.icon || '•')}</div>
              <div class="row-meta">
                <span class="row-name">${esc(p.name)}</span>
                <span class="row-desc">${esc(p.desc)}</span>
              </div>
              <div class="row-right">
                <div class="row-author">
                  <div class="author-dot-sm" style="background:${color}">${author.charAt(0) || '?'}</div>
                  <span>${author}</span>
                </div>
                <span class="row-path">${esc(p.path || p.href)}</span>
                <span class="row-arrow">↗</span>
              </div>
            </a>`;
        }).join('');
        return `
          <div class="section-group ${accent}">
            <div class="section-label">
              <span class="section-tag">${esc(cat)}</span>
              <div class="section-rule"></div>
              <span class="section-count">${byCat.get(cat).length}</span>
            </div>
            <div class="project-list">${rows}</div>
          </div>`;
      }).join('');

      const el = document.getElementById('index');
      el.className = '';
      el.innerHTML = html;
    }

    fetch('projects.json')
      .then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then((data) => render(data.projects || []))
      .catch(() => {
        document.getElementById('index').innerHTML =
          'Could not load <a href="projects.json">projects.json</a>. ' +
          'Serve this folder over http (e.g. <code>python3 -m http.server</code>) rather than opening the file directly.';
      });
  </script>
</body>
</html>
